<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Random</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: black;
    }

    #message {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 20px;
      z-index: -1;
    }
  </style>
</head>

<body>
  <div id="message">Loading Soccer Random...</div>

  <iframe
    id="game"
    src="https://playgama.com/export/game/soccer-random"
    title="Soccer Random"
    allow="fullscreen; autoplay; gamepad; accelerometer; gyroscope"
    allowfullscreen
    referrerpolicy="no-referrer"
    loading="eager"
    sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-orientation-lock allow-forms allow-presentation">
  </iframe>
</body>
</html>
